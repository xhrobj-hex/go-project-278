name: (-_-) GO CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  go-ci:
    name: Quality checks -> lint, build, test and sonar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
    
      - name: (^_^) Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11

      - name: (^_^) Run build
        run: make build
      
      - name: (^_^) Run tests with coverage
        run: make test-with-coverage

      - name: (^_^) SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5.3.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
